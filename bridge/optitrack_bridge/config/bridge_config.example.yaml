stream:
  protocol: vrpn
  rigid_body_name: h1_2_pelvis
  # Explicit choice: larger MoCap system uses .10, smaller uses .24.
  server_host: tcp://192.168.50.10
  server_port: 3883

bridge:
  dry_run: true
  publish_hz: 200.0
  # Optional: controller commonly re-derives linear velocity from LPF(d/dt position).
  velocity_from_position: true
  log_interval_sec: 1.0
  topic_name: rt/sportmodestate

dds:
  enabled: false
  domain_id: 0
  # Pin CycloneDDS to wired robot NIC (typically enx*) to avoid wrong locator adverts.
  network_interface: enx00e04c681314

transform:
  # IMU_OFFSET in pelvis frame (meters). Used only when origin is pelvis frame (option 2).
  imu_offset_m: [-0.04452, -0.01891, 0.27756]
  # Recommended strategy: track IMU site directly in Motive (option 1), no bridge offset math.
  rigid_body_origin_is_imu_site: true

frame:
  world_z_up: true
  floor_z0: true
  x_forward: true

validation:
  check_mocap_tcp: true
  check_timeout_sec: 1.0
